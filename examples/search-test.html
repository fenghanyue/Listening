<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>搜索测试 — 周杰伦</title>
<style>
body { font-family: system-ui, sans-serif; max-width: 700px; margin: 20px auto; padding: 16px; background: #141218; color: #E6E0E9; }
button { padding: 8px 20px; border-radius: 20px; border: none; background: #D0BCFF; color: #381E72; font-weight: 600; cursor: pointer; font-size: 14px; }
button:disabled { opacity: 0.5; }
input { padding: 10px 16px; border-radius: 20px; border: 1px solid #49454F; background: #2B2930; color: #E6E0E9; font-size: 14px; width: 200px; }
.status { margin: 12px 0; font-size: 13px; color: #CAC4D0; }
.track { display: flex; align-items: center; gap: 12px; padding: 10px; border-radius: 10px; margin: 4px 0; }
.track:hover { background: rgba(255,255,255,0.05); }
.track .src { font-size: 11px; padding: 2px 8px; border-radius: 5px; font-weight: 600; }
.src-netease { background: rgba(255,107,107,.2); color: #ff6b6b; }
.src-qq { background: rgba(77,208,225,.2); color: #4dd0e1; }
.src-kuwo { background: rgba(186,104,200,.2); color: #ba68c8; }
.count { font-size: 13px; color: #CAC4D0; margin-bottom: 8px; }
.err { color: #FFB4AB; }
</style>
</head>
<body>
<h2>🔍 Listening 搜索测试</h2>
<input id="kw" value="周杰伦" placeholder="歌名/歌手">
<button id="go" onclick="doTest()">搜索</button>
<div class="status" id="status"></div>
<div class="count" id="count"></div>
<div id="results"></div>

<script>
let _id = 0;

async function searchNetease(kw, limit) {
  const url = `https://api.qijieya.cn/meting/?type=search&id=${encodeURIComponent(kw)}&limit=${encodeURIComponent(limit)}&server=netease`;
  const r = await fetch(url);
  const json = await r.json();
  if (!Array.isArray(json)) return [];
  return json.map((it, idx) => {
    const songId = (it.url || '').match(/[?&]id=([^&]+)/)?.[1] || `${kw}-${idx + 1}`;
    return { id: ++_id, uid: `netease-${songId}`, source: 'netease', songid: songId, title: it.name || '', artist: it.artist || '', duration: 200 };
  });
}

async function searchQQ(kw, limit) {
  const url = `https://tang.api.s01s.cn/music_open_api.php?msg=${encodeURIComponent(kw)}&type=json`;
  const r = await fetch(url);
  const json = await r.json();
  const data = Array.isArray(json) ? json : (Array.isArray(json?.data) ? json.data : []);
  return data.slice(0, limit).map((it, idx) => {
    const mid = it.song_mid;
    if (!mid) return null;
    return { id: ++_id, uid: `qq-${mid}`, source: 'qq', songid: mid, title: it.song_title || '', artist: it.singer_name || '', duration: 200 };
  }).filter(Boolean);
}

async function searchKuwo(kw, limit) {
  const url = `https://kw-api.cenguigui.cn/?name=${encodeURIComponent(kw)}&page=1&limit=${encodeURIComponent(limit)}`;
  const r = await fetch(url);
  const json = await r.json();
  if (json.code !== 200 || !Array.isArray(json.data)) return [];
  return json.data.map(it => ({ id: ++_id, uid: `kuwo-${it.rid}`, source: 'kuwo', songid: it.rid, title: it.name || '', artist: it.artist || '', duration: 200 }));
}

async function doTest() {
  const kw = document.getElementById('kw').value.trim();
  if (!kw) return;
  document.getElementById('status').textContent = '搜索中…';
  document.getElementById('results').innerHTML = '';
  document.getElementById('count').textContent = '';

  const start = Date.now();
  const [ne, qq, kwRes] = await Promise.all([
    searchNetease(kw, 6).catch(() => []),
    searchQQ(kw, 6).catch(() => []),
    searchKuwo(kw, 6).catch(() => []),
  ]);

  // 交错排列
  const tracks = [];
  const maxLen = Math.max(ne.length, qq.length, kwRes.length);
  for (let i = 0; i < maxLen; i++) {
    if (ne[i]) tracks.push(ne[i]);
    if (qq[i]) tracks.push(qq[i]);
    if (kwRes[i]) tracks.push(kwRes[i]);
  }

  const elapsed = Date.now() - start;
  document.getElementById('status').textContent = `耗时 ${elapsed}ms`;
  document.getElementById('count').textContent = `共 ${tracks.length} 首（网易云 ${ne.length} · QQ ${qq.length} · 酷我 ${kwRes.length}）`;

  const srcClass = { netease: 'src-netease', qq: 'src-qq', kuwo: 'src-kuwo' };
  const srcLabel = { netease: '网易云', qq: 'QQ', kuwo: '酷我' };
  document.getElementById('results').innerHTML = tracks.map((t, i) =>
    `<div class="track"><span class="src ${srcClass[t.source] || ''}">${srcLabel[t.source] || t.source}</span> <strong>${(i+1)}.</strong> ${t.title} — ${t.artist}</div>`
  ).join('');
}
</script>
</body>
</html>
