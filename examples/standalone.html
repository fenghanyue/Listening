<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Listening — 音乐搜索</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,400,0..1,0" />
<style>
  :root {
    /* Material Design 3 — dark tonal palette */
    --md-primary: #D0BCFF;
    --md-on-primary: #381E72;
    --md-primary-container: #4F378B;
    --md-on-primary-container: #EADDFF;
    --md-secondary-container: #4A4458;
    --md-on-secondary-container: #E8DEF8;
    --md-surface-container-lowest: #0F0D13;
    --md-surface-container-low: #1D1B20;
    --md-surface-container: #211F26;
    --md-surface-container-high: #2B2930;
    --md-surface-container-highest: #36343B;
    --md-on-surface: #E6E0E9;
    --md-on-surface-variant: #CAC4D0;
    --md-outline: #948F99;
    --md-outline-variant: #49454F;
    --md-inverse-surface: #E6E0E9;
    --md-inverse-on-surface: #313033;
    --md-error: #FFB4AB;

    --bg: #141218; --panel: var(--md-surface-container-low); --accent: var(--md-primary);
    --text: var(--md-on-surface); --sub: var(--md-on-surface-variant); --border: var(--md-outline-variant);
    --heart: #FFB4AB; --hover: rgba(230,224,233,0.08); --press: rgba(230,224,233,0.12);

    --e1: 0 1px 2px rgba(0,0,0,.45), 0 1px 3px 1px rgba(0,0,0,.25);
    --e2: 0 1px 2px rgba(0,0,0,.45), 0 2px 6px 2px rgba(0,0,0,.25);
    --e3: 0 4px 8px 3px rgba(0,0,0,.25), 0 1px 3px rgba(0,0,0,.4);

    font-family: 'Roboto', system-ui, -apple-system, sans-serif;
  }

  :root[data-theme="light"] {
    --md-primary: #6750A4;
    --md-on-primary: #FFFFFF;
    --md-primary-container: #EADDFF;
    --md-on-primary-container: #21005D;
    --md-secondary-container: #E8DEF8;
    --md-on-secondary-container: #1D192B;
    --md-surface-container-lowest: #FFFFFF;
    --md-surface-container-low: #F7F2FA;
    --md-surface-container: #F3EDF7;
    --md-surface-container-high: #ECE6F0;
    --md-surface-container-highest: #E6E0E9;
    --md-on-surface: #1D1B20;
    --md-on-surface-variant: #49454F;
    --md-outline: #79747E;
    --md-outline-variant: #CAC4D0;
    --md-inverse-surface: #313033;
    --md-inverse-on-surface: #F4EFF4;
    --md-error: #BA1A1A;

    --bg: #FFFBFE; --panel: var(--md-surface-container-low); --accent: var(--md-primary);
    --text: var(--md-on-surface); --sub: var(--md-on-surface-variant); --border: var(--md-outline-variant);
    --heart: #BA1A1A; --hover: rgba(29,27,32,0.06); --press: rgba(29,27,32,0.10);

    --e1: 0 1px 2px rgba(0,0,0,.12), 0 1px 3px 1px rgba(0,0,0,.08);
    --e2: 0 1px 2px rgba(0,0,0,.12), 0 2px 6px 2px rgba(0,0,0,.08);
    --e3: 0 4px 8px 3px rgba(0,0,0,.10), 0 1px 3px rgba(0,0,0,.14);
  }
  :root[data-theme="light"] .s-netease { background: rgba(255,107,107,.15); color:#c62828; }
  :root[data-theme="light"] .s-qq { background: rgba(77,208,225,.18); color:#00838f; }
  :root[data-theme="light"] .s-kuwo { background: rgba(186,104,200,.18); color:#8e24aa; }
  :root[data-theme="light"] .s-joox { background: rgba(101,247,196,.28); color:#00897b; }
  :root[data-theme="light"] .s-soundcloud { background: rgba(255,136,0,.18); color:#e65100; }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  .material-symbols-outlined {
    font-family: 'Material Symbols Outlined';
    font-weight: normal; font-style: normal; font-size: 20px; line-height: 1;
    letter-spacing: normal; text-transform: none; display: inline-block;
    white-space: nowrap; word-wrap: normal; direction: ltr;
    -webkit-font-feature-settings: 'liga'; -webkit-font-smoothing: antialiased;
    vertical-align: middle; font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    flex-shrink: 0;
  }
  .icon-fill { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--md-outline-variant); border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--md-outline); }

  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }

  body {
    background: var(--bg); color: var(--text);
    min-height: 100vh; font-size: 14px;
  }

  button { font-family: inherit; }

  /* ========= 布局 ========= */
  .layout { display: flex; height: 100vh; }
  .sidebar {
    width: 260px; min-width: 260px; background: var(--panel);
    border-right: none; display: flex; flex-direction: column;
    overflow: hidden;
  }
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }

  /* ========= 侧栏 ========= */
  .sidebar-header {
    box-sizing: border-box; height: 76px; padding: 0 20px; border-bottom: none;
    display: flex; align-items: center; justify-content: space-between;
  }
  .sidebar-header h2 { font-size: 22px; font-weight: 500; display: flex; align-items: center; gap: 10px; letter-spacing: 0; }
  .sidebar-header .btn-icon {
    width: 40px; height: 40px; border-radius: 50%; border: none;
    background: none; color: var(--text); font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s;
  }
  .sidebar-header .btn-icon:hover { background: var(--hover); }
  .sidebar-header .btn-icon:active { background: var(--press); }
  .sidebar-actions {
    box-sizing: border-box; height: 50px; padding: 0 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
  }
  .btn-outline {
    flex: 1; padding: 9px 0; border-radius: 20px; border: 1px solid var(--border);
    background: none; color: var(--md-on-surface-variant); font-size: 12px; font-weight: 500; cursor: pointer;
    white-space: nowrap; transition: all .15s; display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .btn-outline:hover { background: var(--hover); border-color: var(--md-outline); }
  .btn-outline .material-symbols-outlined { font-size: 16px; }
  .playlist-list { flex: 1; overflow-y: auto; padding: 4px 12px 12px; display: flex; flex-direction: column; gap: 2px; }
  .pl-item {
    display: flex; align-items: center; gap: 12px; padding: 10px 16px;
    border-radius: 28px; cursor: pointer; transition: background .15s;
    user-select: none;
  }
  .pl-item:hover { background: var(--hover); }
  .pl-item.active { background: var(--md-secondary-container); }
  .pl-item.active .pl-name, .pl-item.active .pl-count { color: var(--md-on-secondary-container); }
  .pl-icon {
    width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .pl-icon.tile-cool { background: linear-gradient(135deg, var(--md-primary), #5c4a99); }
  .pl-icon.tile-warm { background: linear-gradient(135deg, #ff8a80, #ff5c8a); }
  .pl-icon .material-symbols-outlined { font-size: 18px; color: #fff; }
  .pl-info { flex: 1; min-width: 0; }
  .pl-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pl-count { font-size: 11px; color: var(--sub); }
  .pl-del {
    width: 28px; height: 28px; border-radius: 50%; border: none;
    background: none; color: var(--sub); font-size: 14px; cursor: pointer;
    visibility: hidden; display: flex; align-items: center; justify-content: center;
  }
  .pl-del .material-symbols-outlined { font-size: 16px; }
  .pl-item:hover .pl-del { visibility: visible; }
  .pl-del:hover { background: rgba(255,180,171,0.2); color: var(--heart); }
  .pl-del.builtin { display: none !important; }

  /* ========= 主区域 ========= */
  .top-bar {
    box-sizing: border-box; height: 76px; padding: 0 24px; border-bottom: none;
    display: flex; align-items: center; gap: 12px;
  }
  .top-bar .back-btn {
    display: none; width: 40px; height: 40px; border-radius: 50%; border: none;
    background: none; color: var(--text); font-size: 16px; cursor: pointer;
    align-items: center; justify-content: center; transition: background .15s;
  }
  .top-bar .back-btn:hover { background: var(--hover); }
  .top-bar .view-title { font-size: 22px; font-weight: 500; }
  .search-bar { display: flex; gap: 8px; flex: 1; }
  .search-input-wrap { position: relative; flex: 1; display: flex; align-items: center; }
  .search-input-wrap .search-icon { position: absolute; left: 16px; color: var(--sub); font-size: 20px; pointer-events: none; }
  .search-bar input {
    width: 100%; padding: 12px 16px 12px 46px; border-radius: 28px;
    border: none; background: var(--md-surface-container-high); color: var(--text);
    font-size: 14px; outline: none; transition: box-shadow .15s;
  }
  .search-bar input:focus { box-shadow: 0 0 0 2px var(--accent); }
  .search-bar button {
    padding: 0 22px; border-radius: 20px; border: none;
    background: var(--accent); color: var(--md-on-primary); font-weight: 500; font-size: 14px; cursor: pointer;
    transition: opacity .15s;
  }
  .search-bar button:hover { opacity: 0.9; }
  .search-bar button:disabled { opacity: 0.4; cursor: not-allowed; }

  .view-toggle { display: flex; background: var(--md-surface-container-high); border-radius: 20px; padding: 2px; gap: 2px; flex-shrink: 0; }
  .view-toggle-btn {
    width: 36px; height: 36px; border: none; background: none; border-radius: 18px;
    display: flex; align-items: center; justify-content: center; color: var(--sub); cursor: pointer; transition: all .15s;
  }
  .view-toggle-btn .material-symbols-outlined { font-size: 20px; }
  .view-toggle-btn.active { background: var(--accent); color: var(--md-on-primary); }
  .view-toggle-btn:hover:not(.active) { background: var(--hover); }

  .sources {
    box-sizing: border-box; height: 50px; padding: 0 24px; display: flex; align-items: center; gap: 8px; font-size: 12px;
    border-bottom: 1px solid var(--border); flex-wrap: nowrap; overflow-x: auto;
  }
  .sources label {
    position: relative; display: flex; align-items: center; gap: 6px; cursor: pointer; color: var(--sub);
    padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border); transition: all .15s;
  }
  .sources label:has(input:checked) { background: var(--md-secondary-container); color: var(--md-on-secondary-container); border-color: transparent; }
  .sources label:has(input:checked)::before {
    content: "check"; font-family: 'Material Symbols Outlined'; font-size: 16px; font-variation-settings: 'FILL' 0, 'wght' 500;
  }
  .sources input[type="checkbox"] { position: absolute; width: 1px; height: 1px; opacity: 0; }
  .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
  .d-netease { background: #ff6b6b; } .d-qq { background: #4dd0e1; }
  .d-kuwo { background: #ba68c8; } .d-joox { background: #65f7c4; }
  .d-soundcloud { background: #ff8800; }

  .status { padding: 8px 24px; font-size: 12px; color: var(--sub); min-height: 20px; }
  .status.err { color: var(--md-error); }

  .content-area { flex: 1; overflow-y: auto; padding: 0 24px 16px; }

  /* ========= 搜索结果 / 歌单列表 ========= */
  .track-list { list-style: none; display: grid; grid-template-columns: repeat(auto-fill, minmax(168px, 1fr)); gap: 20px; padding-top: 8px; }
  .track-list li {
    display: flex; flex-direction: column; padding: 12px;
    border-radius: 12px; cursor: default; position: relative;
    background: var(--md-surface-container);
    transition: background .2s;
  }
  .track-list li:hover { background: var(--md-surface-container-high); }
  .track-list li.playing { background: var(--md-primary-container); }
  .track-list li.playing .track-title, .track-list li.playing .track-artist { color: var(--md-on-primary-container); }

  .card-cover-wrap {
    position: relative; width: 100%; aspect-ratio: 1 / 1; border-radius: 8px; overflow: hidden;
    margin-bottom: 12px; cursor: pointer; background: var(--md-surface-container-highest);
  }
  .card-cover-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .card-cover-wrap[data-source="netease"] { background: linear-gradient(135deg, rgba(255,107,107,.45), rgba(255,107,107,.08)); }
  .card-cover-wrap[data-source="qq"] { background: linear-gradient(135deg, rgba(77,208,225,.45), rgba(77,208,225,.08)); }
  .card-cover-wrap[data-source="kuwo"] { background: linear-gradient(135deg, rgba(186,104,200,.45), rgba(186,104,200,.08)); }
  .card-cover-wrap[data-source="joox"] { background: linear-gradient(135deg, rgba(101,247,196,.45), rgba(101,247,196,.08)); }
  .card-cover-wrap[data-source="soundcloud"] { background: linear-gradient(135deg, rgba(255,136,0,.45), rgba(255,136,0,.08)); }
  .cover-fallback { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
  .cover-fallback .material-symbols-outlined { font-size: 34px; color: rgba(255,255,255,.85); }
  .card-play-overlay {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.38); opacity: 0; transition: opacity .2s;
  }
  .card-cover-wrap:hover .card-play-overlay { opacity: 1; }
  .card-play-overlay .material-symbols-outlined { font-size: 44px; color: #fff; filter: drop-shadow(0 2px 6px rgba(0,0,0,.5)); }
  .card-meta { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .card-title-row { min-width: 0; }
  .card-sub-row { display: flex; align-items: center; gap: 6px; min-width: 0; }

  /* 列表视图 */
  .track-list.list-mode { display: flex; flex-direction: column; gap: 2px; }
  .track-list.list-mode li { flex-direction: row; align-items: center; gap: 12px; padding: 8px 12px; }
  .track-list.list-mode .track-info { flex-direction: row; align-items: center; gap: 12px; flex: 1; min-width: 0; }
  .track-list.list-mode .card-cover-wrap {
    width: 44px; height: 44px; aspect-ratio: unset; flex-shrink: 0; margin-bottom: 0; border-radius: 6px;
  }
  .track-list.list-mode .cover-fallback .material-symbols-outlined { font-size: 20px; }
  .track-list.list-mode .card-play-overlay .material-symbols-outlined { font-size: 26px; }
  .track-list.list-mode .card-meta { flex: 1; min-width: 0; }
  .track-list.list-mode .track-actions { margin-top: 0; flex-shrink: 0; }

  .s-tag { font-size: 10px; padding: 2px 7px; border-radius: 6px; font-weight: 600; text-transform: uppercase; min-width: 28px; text-align: center; }
  .s-netease { background: rgba(255,107,107,0.18); color: #ff6b6b; }
  .s-qq { background: rgba(77,208,225,0.18); color: #4dd0e1; }
  .s-kuwo { background: rgba(186,104,200,0.18); color: #ba68c8; }
  .s-joox { background: rgba(101,247,196,0.18); color: #65f7c4; }
  .s-soundcloud { background: rgba(255,136,0,0.18); color: #ff8800; }

  .track-info { display: flex; flex-direction: column; min-width: 0; cursor: pointer; }
  .track-title { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .track-artist { font-size: 12px; color: var(--sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .track-quality { font-size: 10px; padding: 1px 5px; border-radius: 3px; background: var(--md-surface-container-high); color: var(--sub); }

  .track-actions { display: flex; gap: 4px; flex-shrink: 0; margin-top: 10px; justify-content: flex-end; }
  .btn-action {
    width: 32px; height: 32px; border-radius: 50%; border: none;
    background: none; font-size: 15px; cursor: pointer; transition: all .15s;
    display: flex; align-items: center; justify-content: center; color: var(--sub);
  }
  .btn-action .material-symbols-outlined { font-size: 18px; }
  .btn-action:hover { background: var(--hover); }
  .btn-action:active { transform: scale(0.9); }
  .btn-like { color: var(--sub); }
  .btn-like.liked { color: var(--heart); }
  .btn-like:hover { color: var(--heart); }
  .btn-add { color: var(--sub); }
  .btn-add:hover { color: var(--accent); }
  .btn-remove { color: var(--sub); font-size: 13px; }
  .btn-remove:hover { color: var(--heart); background: rgba(255,180,171,0.15); }

  /* ========= 底部播放器 ========= */
  .now-playing-bar {
    margin: 0 16px 16px; padding: 14px 20px; border-top: none;
    display: flex; align-items: center; gap: 16px;
    background: var(--md-surface-container-high); border-radius: 16px; box-shadow: var(--e2);
  }
  .np-cover {
    width: 56px; height: 56px; border-radius: 10px; object-fit: cover;
    background: var(--md-surface-container-highest); flex-shrink: 0;
  }
  .np-cover.placeholder {
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; color: var(--sub); position: relative;
  }
  .np-cover.placeholder::before {
    content: "music_note"; font-family: 'Material Symbols Outlined'; font-size: 22px; color: var(--sub);
  }
  .np-info { min-width: 0; flex: 1; }
  .np-title { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .np-artist { font-size: 12px; color: var(--sub); }
  .np-controls { display: flex; align-items: center; gap: 10px; }
  .np-controls audio { height: 36px; width: 280px; accent-color: var(--accent); border-radius: 18px; }
  audio::-webkit-media-controls-overflow-button { display: none !important; }
  audio::-webkit-media-controls-download-button { display: none !important; }

  /* ========= 弹窗 ========= */
  .overlay {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); z-index: 100;
    align-items: center; justify-content: center;
  }
  .overlay.show { display: flex; }
  .modal {
    background: var(--md-surface-container-high); border-radius: 28px; border: none;
    padding: 24px; width: 360px; max-height: 80vh; display: flex; flex-direction: column;
    box-shadow: var(--e3);
  }
  .modal h3 { font-size: 20px; font-weight: 500; margin-bottom: 18px; }
  .modal input {
    width: 100%; padding: 12px 16px; border-radius: 4px;
    border: 1px solid var(--border); background: var(--md-surface-container-highest); color: var(--text);
    font-size: 14px; outline: none; margin-bottom: 16px;
  }
  .modal input:focus { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .modal-actions { display: flex; gap: 4px; justify-content: flex-end; }
  .btn-primary {
    padding: 10px 24px; border-radius: 20px; border: none;
    background: var(--accent); color: var(--md-on-primary); font-weight: 500; font-size: 14px; cursor: pointer;
  }
  .btn-primary:hover { opacity: 0.9; }
  .btn-secondary {
    padding: 10px 20px; border-radius: 20px; border: none;
    background: none; color: var(--accent); font-size: 14px; font-weight: 500; cursor: pointer;
  }
  .btn-secondary:hover { background: rgba(208,188,255,0.08); }

  .modal-list { flex: 1; overflow-y: auto; margin-bottom: 12px; }
  .modal-list-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; border-radius: 12px; cursor: pointer;
    transition: background .15s;
  }
  .modal-list-item:hover { background: var(--hover); }
  .modal-list-item .pl-info { flex: 1; }
  .modal-create {
    padding: 12px; border-top: 1px solid var(--border); cursor: pointer;
    color: var(--accent); font-weight: 500; text-align: center;
    border-radius: 12px; transition: background .15s;
  }
  .modal-create:hover { background: rgba(208,188,255,0.08); }

  /* toast (Material Snackbar) */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--md-inverse-surface); border: none; color: var(--md-inverse-on-surface);
    padding: 14px 20px; border-radius: 4px; font-size: 13px; font-weight: 500;
    z-index: 200; pointer-events: none;
    animation: toastIn .25s ease, toastOut .25s ease 1.75s forwards;
    box-shadow: var(--e2);
  }
  @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(12px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
  @keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

  /* 歌词弹窗 */
  .lrc-overlay {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85); z-index: 100; overflow-y: auto;
    cursor: pointer;
  }
  .lrc-overlay.show { display: block; }
  .lrc-full {
    max-width: 560px; margin: 60px auto; padding: 40px 24px 200px;
    font-size: 22px; line-height: 2; color: rgba(230,224,233,0.35); text-align: center;
  }
  .lrc-full .l-cur-full { color: var(--accent); font-weight: 700; font-size: 24px; }

  .lrc-toggle {
    font-size: 12px; color: var(--sub); cursor: pointer; margin-left: 8px;
    text-decoration: none; user-select: none;
  }
  .lrc-toggle:hover { color: var(--accent); }

  /* 移动端侧栏 */
  .sidebar-toggle {
    display: none; position: fixed; top: 12px; left: 12px; z-index: 50;
    width: 40px; height: 40px; border-radius: 50%; border: none;
    background: var(--panel); color: var(--text); font-size: 18px; cursor: pointer;

</style>

  <div class="lrc-full" id="lrcFull"></div>

<!-- hls.js for SoundCloud -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5"></script>
<script>
// ====================== 常量 ======================

const LS_KEY = 'listening_playlists';
const LIKED_ID = '__liked__';

// 歌单图标的配色方案（新建歌单时随机挑一个，之后固定不变）
const TILE_PALETTES = [
  'linear-gradient(135deg, #7C6BC4, #5C4A99)',
  'linear-gradient(135deg, #4FC3C0, #2A8F92)',
  'linear-gradient(135deg, #E8916B, #C96A3E)',
  'linear-gradient(135deg, #6FB07F, #3E8F58)',
  'linear-gradient(135deg, #5B9BD5, #3A6EA8)',
  'linear-gradient(135deg, #C97BB0, #A2508C)',
  'linear-gradient(135deg, #E0714F, #B84E30)',
  'linear-gradient(135deg, #57B894, #348467)',
  'linear-gradient(135deg, #6C8FE0, #4666B0)',
  'linear-gradient(135deg, #D68A3E, #A9651F)',
  'linear-gradient(135deg, #9C7BD9, #6E52AD)',
  'linear-gradient(135deg, #4DAEC7, #2C7F96)',
  'linear-gradient(135deg, #E06B93, #B84A6F)',
  'linear-gradient(135deg, #7FB05A, #57883A)',
  'linear-gradient(135deg, #C4A24E, #967B2E)',
  'linear-gradient(135deg, #5FA8D3, #3873A0)',
  'linear-gradient(135deg, #B573C4, #87519A)',
  'linear-gradient(135deg, #63B084, #3D8760)',
  'linear-gradient(135deg, #E08F3C, #B96A1F)',
  'linear-gradient(135deg, #7590D6, #4F63A8)',
];
function pickTileColor() {
  return TILE_PALETTES[Math.floor(Math.random() * TILE_PALETTES.length)];
}
function getTileColor(pl) {
  if (pl.color) return pl.color;
  let hash = 0;
  for (let i = 0; i < pl.id.length; i++) hash = (hash * 31 + pl.id.charCodeAt(i)) >>> 0;
  return TILE_PALETTES[hash % TILE_PALETTES.length];
}

// ====================== 数据层：歌单 ======================

function loadPlaylists() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch (e) { return []; }
}

function savePlaylists(pls) {
  localStorage.setItem(LS_KEY, JSON.stringify(pls));
}

/** 确保「喜欢的歌曲」存在 */
function ensureLiked(pls) {
  const existing = pls.find(p => p.id === LIKED_ID);
  if (!existing) {
    pls.unshift({
      id: LIKED_ID,
      name: '喜欢的歌曲',
      isBuiltin: true,
      tracks: [],
      createdAt: new Date().toISOString(),
    });
    savePlaylists(pls);
  } else if (existing.name !== '喜欢的歌曲') {
    existing.name = '喜欢的歌曲';
    savePlaylists(pls);
  }
  return pls;
}

/** 标准化 track（存所有播放/详情需要的字段） */
function slimTrack(t) {
  return {
    uid: t.uid, source: t.source,
    title: t.title, artist: t.artist, album: t.album || '',
    cover: t.cover || null,
    // 各平台 fetch 详情需要的字段
    songid: t.songid, kw: t.kw, lrcUrl: t.lrcUrl || null,
    // QQ
    qqId: t.qqId, songMid: t.songMid, qqSearchKey: t.qqSearchKey, qqIndex: t.qqIndex,
    // JOOX
    jooxIndex: t.jooxIndex, JX_TOKEN: t.JX_TOKEN, JX_BR: t.JX_BR,
    // SoundCloud — 保存搜索时拿到的 transcodings，避免从歌单播放还要重新请求 track 详情
    scStreamUrl: t.scStreamUrl || null,
    scTranscodings: t.scTranscodings || null,
    scTrackAuth: t.scTrackAuth || null,
  };
}

/** 判断 track 是否在指定歌单中 */
function hasTrack(playlist, track) {
  return playlist.tracks.some(tr => tr.uid === track.uid);
}

/** toggle 喜欢 */
function toggleLike(track) {
  const pls = ensureLiked(loadPlaylists());
  const liked = pls.find(p => p.id === LIKED_ID);
  const idx = liked.tracks.findIndex(tr => tr.uid === track.uid);
  if (idx >= 0) {
    liked.tracks.splice(idx, 1);
  } else {
    liked.tracks.push(slimTrack(track));
  }
  savePlaylists(pls);
  return idx < 0; // true: 已喜欢
}

/** 检查是否已喜欢 */
function isLiked(track) {
  const pls = loadPlaylists();
  const liked = pls.find(p => p.id === LIKED_ID);
  return liked ? liked.tracks.some(tr => tr.uid === track.uid) : false;
}

/** 添加到歌单（uid 去重） */
function addToPlaylist(playlistId, track) {
  const pls = loadPlaylists();
  const pl = pls.find(p => p.id === playlistId);
  if (!pl) return false;
  if (hasTrack(pl, track)) return false; // 已存在
  pl.tracks.push(slimTrack(track));
  savePlaylists(pls);
  return true;
}

/** 从歌单移除 */
function removeFromPlaylist(playlistId, trackUid) {
  const pls = loadPlaylists();
  const pl = pls.find(p => p.id === playlistId);
  if (!pl) return;
  pl.tracks = pl.tracks.filter(tr => tr.uid !== trackUid);
  savePlaylists(pls);
}

/** 创建歌单 */
function createPlaylist(name) {
  const pls = ensureLiked(loadPlaylists());
  const pl = {
    id: 'pl_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
    name: name.trim().slice(0, 50),
    tracks: [],
    color: pickTileColor(),
    createdAt: new Date().toISOString(),
  };
  pls.push(pl);
  savePlaylists(pls);
  return pl;
}

/** 删除歌单（内置歌单不可删） */
function deletePlaylist(playlistId) {
  let pls = loadPlaylists();
  const pl = pls.find(p => p.id === playlistId);
  if (!pl || pl.isBuiltin) return false;
  pls = pls.filter(p => p.id !== playlistId);
  savePlaylists(pls);
  return true;
}

/** 获取歌单 */
function getPlaylist(playlistId) {
  return loadPlaylists().find(p => p.id === playlistId);
}

/** 导出歌单为 JSON */
function exportPlaylists(ids) {
  const pls = loadPlaylists();
  const toExport = ids ? pls.filter(p => ids.includes(p.id)) : pls;
  return JSON.stringify(toExport.map(p => ({
    id: p.id, name: p.name, tracks: p.tracks, createdAt: p.createdAt,
  })), null, 2);
}

/** 导入歌单 */
function importPlaylists(jsonStr) {
  try {
    const incoming = JSON.parse(jsonStr);
    if (!Array.isArray(incoming)) throw new Error('格式错误：需要数组');
    const pls = ensureLiked(loadPlaylists());
    let added = 0, merged = 0;

    for (const imp of incoming) {
      if (!imp.name || !Array.isArray(imp.tracks)) continue;
      const exist = pls.find(p => p.id === imp.id || (p.name === imp.name && p.id !== LIKED_ID));
      if (exist) {
        // 合并：同名歌单追加不重复的 track
        const existUids = new Set(exist.tracks.map(tr => tr.uid));
        const fresh = imp.tracks.filter(tr => !existUids.has(tr.uid));
        exist.tracks.push(...fresh);
        merged++;
      } else {
        pls.push({
          id: imp.id || ('pl_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6)),
          name: imp.name,
          tracks: imp.tracks || [],
          createdAt: imp.createdAt || new Date().toISOString(),
        });
        added++;
      }
    }
    savePlaylists(pls);
    return { added, merged };
  } catch (e) {
    throw new Error('导入失败: ' + e.message);
  }
}

// ====================== UI: 侧栏 ======================

let currentView = 'search'; // 'search' | playlistId
let pendingTrack = null;   // 待添加的 track（选歌单弹窗用）

function renderSidebar(activeId) {
  const pls = ensureLiked(loadPlaylists());
  const el = document.getElementById('playlistList');
  el.innerHTML = '';

  pls.forEach(pl => {
    const div = document.createElement('div');
    div.className = 'pl-item' + (activeId === pl.id ? ' active' : '');
    div.innerHTML = `
      <span class="pl-icon${pl.id === LIKED_ID ? ' tile-warm' : ''}" style="${pl.id === LIKED_ID ? '' : 'background:' + getTileColor(pl) + ';'}">${pl.id === LIKED_ID ? `<span class="material-symbols-outlined icon-fill">favorite</span>` : `<span class="material-symbols-outlined">queue_music</span>`}</span>
      <span class="pl-info">
        <span class="pl-name">${esc(pl.name)}</span>
        <span class="pl-count">${pl.tracks.length} 首</span>
      </span>
      <button class="pl-del${pl.isBuiltin ? ' builtin' : ''}" data-plid="${pl.id}" title="删除歌单"><span class="material-symbols-outlined">delete</span></button>
    `;
    div.addEventListener('click', (e) => {
      // 不拦截删除按钮
      if (e.target.closest('.pl-del')) return;
      openPlaylist(pl.id);
    });
    el.appendChild(div);
  });

  // 删除按钮事件
  el.querySelectorAll('.pl-del:not(.builtin)').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      if (confirm(`确定删除歌单「${esc(pls.find(p => p.id === btn.dataset.plid)?.name || '')}」？`)) {
        deletePlaylist(btn.dataset.plid);
        if (currentView === btn.dataset.plid) {
          currentView = 'search';
          renderMain();
        }
        renderSidebar(currentView === 'search' ? null : currentView);
      }
    });
  });
}

// ====================== UI: 主区域 ======================

function switchView(view, playlistId) {
  currentView = view;
  const backBtn = document.getElementById('backBtn');
  const viewTitle = document.getElementById('viewTitle');
  const searchBar = document.getElementById('searchBar');
  const sourceFilters = document.getElementById('sourceFilters');
  const contentArea = document.getElementById('contentArea');
  const status = document.getElementById('status');

  if (view === 'search') {
    backBtn.style.display = 'none';
    viewTitle.style.display = 'none';
    searchBar.style.display = 'flex';
    sourceFilters.style.display = 'flex';
    status.style.display = 'block';
    contentArea.innerHTML = `<ol class="${trackListClass()}" id="trackList"></ol>`;
    renderSidebar(null);
  } else {
    backBtn.style.display = 'flex';
    viewTitle.style.display = 'block';
    searchBar.style.display = 'none';
    sourceFilters.style.display = 'none';
    status.style.display = 'none';
    renderPlaylistContent(playlistId);
    renderSidebar(playlistId);
  }
}

function openPlaylist(playlistId) {
  switchView('playlist', playlistId);
}

function renderPlaylistContent(playlistId) {
  const pl = getPlaylist(playlistId);
  if (!pl) { switchView('search'); return; }

  document.getElementById('viewTitle').textContent = pl.name;

  const area = document.getElementById('contentArea');
  const likedUids = new Set(
    (loadPlaylists().find(p => p.id === LIKED_ID)?.tracks || []).map(tr => tr.uid)
  );

  if (!pl.tracks.length) {
    area.innerHTML = `<div style="text-align:center;padding:60px 20px;color:var(--sub)">
      <div style="font-size:40px;margin-bottom:12px;display:flex;justify-content:center">${pl.id === LIKED_ID ? '<span class="material-symbols-outlined" style="font-size:40px;color:var(--heart)">favorite</span>' : '<span class="material-symbols-outlined" style="font-size:40px">queue_music</span>'}</div>
      <div>${pl.id === LIKED_ID ? '还没有喜欢的歌曲，去搜索页添加吧' : '歌单是空的，去搜索页添加歌曲吧'}</div>
    </div>`;
    return;
  }

  area.innerHTML = `<ol class="${trackListClass()}" id="trackList"></ol>`;
  const ol = document.getElementById('trackList');

  pl.tracks.forEach((t, idx) => {
    const li = document.createElement('li');
    const liked = likedUids.has(t.uid);
    li.innerHTML = `
      <div class="track-info">
        <div class="card-cover-wrap" data-source="${t.source}">
          ${t.cover ? `<img src="${t.cover}" alt="" loading="lazy">` : `<div class="cover-fallback"><span class="material-symbols-outlined">music_note</span></div>`}
          <div class="card-play-overlay"><span class="material-symbols-outlined icon-fill">play_circle</span></div>
        </div>
        <div class="card-meta">
          <div class="card-title-row"><span class="track-title">${esc(t.title)}</span></div>
          <div class="card-sub-row"><span class="s-tag s-${t.source}">${t.source}</span><span class="track-artist">${esc(t.artist)}</span></div>
        </div>
      </div>
      <div class="track-actions">
        ${playlistId !== LIKED_ID ? '<button class="btn-action btn-remove" title="移出歌单"><span class="material-symbols-outlined">playlist_remove</span></button>' : ''}
        <button class="btn-action btn-like${liked ? ' liked' : ''}" title="${liked ? '取消喜欢' : '喜欢'}">${liked ? '<span class="material-symbols-outlined icon-fill">favorite</span>' : '<span class="material-symbols-outlined">favorite_border</span>'}</button>
      </div>
    `;

    // 点击标题播放
    li.querySelector('.track-info').addEventListener('click', () => {
      playFromPlaylist(t, li, pl.tracks, idx);
    });

    // 喜欢按钮
    li.querySelector('.btn-like').addEventListener('click', (e) => {
      e.stopPropagation();
      const nowLiked = toggleLike(t);
      const btn = li.querySelector('.btn-like');
      btn.classList.toggle('liked', nowLiked);
      btn.innerHTML = nowLiked ? '<span class="material-symbols-outlined icon-fill">favorite</span>' : '<span class="material-symbols-outlined">favorite_border</span>';
      btn.title = nowLiked ? '取消喜欢' : '喜欢';
      toast(nowLiked ? '已添加到 ❤️ 喜欢的歌曲' : '已取消喜欢');
      renderSidebar(currentView);
    });

    // 移除按钮（喜欢的歌曲不显示移除按钮）
    const removeBtn = li.querySelector('.btn-remove');
    if (removeBtn) {
      removeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        removeFromPlaylist(playlistId, t.uid);
        renderPlaylistContent(playlistId);
        renderSidebar(playlistId);
        toast('已从歌单移除');
      });
    }

    ol.appendChild(li);
  });
}

/** 从歌单播放 — 从头 fetch 详情 */
async function playFromPlaylist(track, li, trackList, index) {
  // 构造完整 track 对象去 fetch 详情
  const full = { ...track, detailsLoaded: false, audioUrl: null, lrc: null, lrcUrl: null, quality: null, qualityLabel: null };
  await play(full, li, trackList, index);
}

function renderMain() {
  // 清空主区域
  document.getElementById('trackList').innerHTML = '';
}

// ====================== UI: 搜索结果渲染 ======================

function renderTracks(tracks) {
  const likedUids = new Set(
    (loadPlaylists().find(p => p.id === LIKED_ID)?.tracks || []).map(tr => tr.uid)
  );

  const ol = document.getElementById('trackList');
  ol.innerHTML = '';

  tracks.forEach((t, idx) => {
    const li = document.createElement('li');
    const liked = likedUids.has(t.uid);
    li.innerHTML = `
      <div class="track-info">
        <div class="card-cover-wrap" data-source="${t.source}">
          ${t.cover ? `<img src="${t.cover}" alt="" loading="lazy">` : `<div class="cover-fallback"><span class="material-symbols-outlined">music_note</span></div>`}
          <div class="card-play-overlay"><span class="material-symbols-outlined icon-fill">play_circle</span></div>
        </div>
        <div class="card-meta">
          <div class="card-title-row"><span class="track-title">${esc(t.title)}</span></div>
          <div class="card-sub-row"><span class="s-tag s-${t.source}">${t.source}</span><span class="track-artist">${esc(t.artist)}</span></div>
        </div>
      </div>
      <div class="track-actions">
        <button class="btn-action btn-add" title="添加到歌单"><span class="material-symbols-outlined">playlist_add</span></button>
        <button class="btn-action btn-like${liked ? ' liked' : ''}" title="${liked ? '取消喜欢' : '添加到喜欢的歌曲'}">${liked ? '<span class="material-symbols-outlined icon-fill">favorite</span>' : '<span class="material-symbols-outlined">favorite_border</span>'}</button>
      </div>
    `;

    // 点击标题 → 直接播放
    li.querySelector('.track-info').addEventListener('click', () => {
      play(t, li, tracks, idx);
    });

    // 喜欢按钮
    li.querySelector('.btn-like').addEventListener('click', (e) => {
      e.stopPropagation();
      const nowLiked = toggleLike(t);
      const btn = li.querySelector('.btn-like');
      btn.classList.toggle('liked', nowLiked);
      btn.innerHTML = nowLiked ? '<span class="material-symbols-outlined icon-fill">favorite</span>' : '<span class="material-symbols-outlined">favorite_border</span>';
      btn.title = nowLiked ? '取消喜欢' : '添加到喜欢的歌曲';
      toast(nowLiked ? '已添加 ❤️' : '已取消喜欢');
      renderSidebar(currentView);
    });

    // 添加到歌单
    li.querySelector('.btn-add').addEventListener('click', (e) => {
      e.stopPropagation();
      showAddModal(t);

// ====================== 工具函数 ======================

function parseLRC(txt) {
  if (!txt) return [];
  const out = [];
  const reg = /\[(\d{1,2}):(\d{1,2})(?:\.(\d{1,3}))?\]/g;
  for (const line of txt.split(/\r?\n/)) {
    reg.lastIndex = 0;
    const m = reg.exec(line);
    if (!m) continue;
    const min = parseInt(m[1], 10) || 0;
    const sec = parseInt(m[2], 10) || 0;
    const ms = m[3] ? parseInt(m[3].padEnd(3, '0'), 10) : 0;
    const time = min * 60 + sec + ms / 1000;
    const text = line.replace(reg, '').trim();
    if (text) out.push({ time, text });
  }
  out.sort((a, b) => a.time - b.time);
  return out;
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function inferQuality(url) {
  if (!url) return { tag: null, label: '' };
  const base = url.split('?')[0].toLowerCase();
  const m = base.match(/\.([a-z0-9]+)$/);
  const ext = m ? m[1] : '';
  if (['flac', 'wav', 'ape', 'alac', 'aiff'].includes(ext)) return { tag: 'lossless', label: 'LOSSLESS' };
  return { tag: '320k', label: '320K' };
}

async function probeUrl(u) {
  if (!u) return false;
  const ctrl = new AbortController();
  const tmr = setTimeout(() => ctrl.abort(), 3000);
  try {
    const r = await fetch(u, { method: 'HEAD', signal: ctrl.signal, cache: 'no-store' });
    if (r.ok || r.status === 206) return true;
  } catch (e) { /* HEAD may fail */ }
  try {
    const r = await fetch(u, { headers: { Range: 'bytes=0-0' }, signal: ctrl.signal });
    return r.ok || r.status === 206;
  } catch (e) { return false; } finally { clearTimeout(tmr); }
}

async function pickJooxUrl(links) {
  const order = ['Atmos全景声','无损FLAC','Hi-Res无损','母带无损','OGG 320','MP3 320','AAC 192','OGG 192','MP3 128','AAC 96','AAC 48'];
  for (const name of order) {
    const u = links[name]; if (!u) continue;
    if (!(await probeUrl(u))) continue;
    if (/母带|无损|flac|hi-res|atmos/i.test(name) || /\.flac(?:\?|$)/i.test(u)) return { url: u, tag: 'lossless', label: 'LOSSLESS' };
    const m = name.match(/(\d+)$/);
    if (m) return { url: u, tag: m[1] + 'k', label: m[1] + 'K' };
    return { url: u, tag: null, label: null };
  }
  return { url: null, tag: null, label: null };
}

async function scProxyAvailable() {

async function getSCClientId() {

      const j = await r.json();
      if (j.client_id) return j.client_id;
    } catch (e) { /* skip */ }
  }
  return 'O7atZypwLvuWSY9hWnnQ3vrLTHH7wqMe';
}

async function scFetch(url) {
  if (await scProxyAvailable()) {
    const proxyUrl = `${SC_PROXY}/proxy?url=${encodeURIComponent(url)}`;
    const r = await fetch(proxyUrl);
    if (!r.ok) throw new Error(`proxy ${r.status}`);
    return r.json();
  }
  const r = await fetch(url, { signal: AbortSignal.timeout(10000) });
  if (!r.ok) throw new Error(`direct ${r.status}`);
  return r.json();
}

        scPermalink: it.permalink_url || '', scPlayCount: it.playback_count || 0,

async function fetchSoundCloudDetails(t) {
  try {
    const cid = await getSCClientId();
    const useProxy = await scProxyAvailable();
    let d = null;

    let transcodings = t.scTranscodings || null;
    const trackAuth = t.scTrackAuth || null;

    if (!transcodings) {
      const url = `https://api-v2.soundcloud.com/tracks/${t.songid}?client_id=${cid}`;
      d = await (useProxy ? scFetch(url) : (await fetch(url, { signal: AbortSignal.timeout(10000) })).json());
      transcodings = d.media?.transcodings || [];
      t.scTrackAuth = d.track_authorization || null;
      t.cover = d.artwork_url || d.user?.avatar_url || t.cover;
      t.title = d.title || t.title;
      t.artist = d.user?.username || t.artist;
    }

    if (transcodings && transcodings.length > 0) {
      const scored = transcodings.map(tr => {
        let score = 0;
        const proto = tr.format?.protocol || '';
        const mime = tr.format?.mime_type || '';
        if (proto === 'hls' && mime.includes('mp4')) score += 100;
        if (proto === 'progressive' && mime.includes('mpeg')) score += 60;
        if (proto === 'hls' && !mime.includes('mp4')) score += 40;
        if (tr.preset?.includes('160')) score += 10;
        if (tr.preset?.includes('sq')) score += 5;
        return { ...tr, score };
      });
      scored.sort((a, b) => b.score - a.score);
      const best = scored[0];
      const isHLS = best.format?.protocol === 'hls';

      const mediaUrl = `${best.url}?client_id=${cid}`;
      try {
        let resolved;
        if (useProxy) {
          const proxyMediaUrl = `${SC_PROXY}/proxy?url=${encodeURIComponent(mediaUrl)}`;
          resolved = await (await fetch(proxyMediaUrl)).json();
        } else {
          resolved = await (await fetch(mediaUrl, { signal: AbortSignal.timeout(10000) })).json();
        }
        if (resolved.url) {
          if (isHLS) {
            t.audioUrl = resolved.url;
            t.scIsHLS = true;
          } else {
            t.audioUrl = useProxy
              ? `${SC_PROXY}/stream?url=${encodeURIComponent(resolved.url)}`
              : resolved.url;
            t.scIsHLS = false;
          }
        }
      } catch (e) {
        console.error('sc media resolve:', e);
        t.audioUrl = mediaUrl;
        t.scIsHLS = isHLS;
      }

      if (t.audioUrl && best.preset) {
        const m = best.preset.match(/(\d+)/);
        t.quality = m ? m[1] + 'k' : '128k';
        t.qualityLabel = best.preset.replace(/_/g, ' ').toUpperCase();
      }
    }

    if (!t.audioUrl && t.scStreamUrl) {
      t.audioUrl = `${t.scStreamUrl}?client_id=${cid}`;
    }

    if (t.audioUrl) {
      if (!t.quality) { t.quality = '128k'; t.qualityLabel = '128K'; }
    }
    t.detailsLoaded = true;
  } catch (e) { console.error('soundcloud detail:', e); }
  return t;
}

// ====================== 聚合 ======================

async function searchAll(kw, sources, limit) {
  const tasks = [];
  if (sources.includes('netease')) tasks.push(searchNetease(kw, 1, limit).then(r => ({ s: 'netease', r })));
  if (sources.includes('qq')) tasks.push(searchQQ(kw, limit).then(r => ({ s: 'qq', r })));
  if (sources.includes('kuwo')) tasks.push(searchKuwo(kw, limit).then(r => ({ s: 'kuwo', r })));
  if (sources.includes('joox')) tasks.push(searchJoox(kw, limit).then(r => ({ s: 'joox', r })));
  if (sources.includes('soundcloud')) tasks.push(searchSoundCloud(kw, limit).then(r => ({ s: 'soundcloud', r })));
  const all = await Promise.all(tasks);

  const grouped = {}, order = [];
  for (const x of all) { grouped[x.s] = x.r; order.push(x.s); }
  const idx = {}; for (const s of order) idx[s] = 0;
  const out = []; let more = true;
  while (more) {
    more = false;
    for (const s of order) {
      if (grouped[s] && idx[s] < grouped[s].length) { out.push(grouped[s][idx[s]++]); more = true; }
    }
  }
  return out;
}

async function ensureDetails(t) {
  if (t.detailsLoaded && t.audioUrl && (t.lrc || !t.lrcUrl)) return t;
  if (t.source === 'netease') return fetchNeteaseDetails(t);
  if (t.source === 'qq') return fetchQQDetails(t);
  if (t.source === 'kuwo') return fetchKuwoDetails(t);
  if (t.source === 'joox') return fetchJooxDetails(t);
  if (t.source === 'soundcloud') return fetchSoundCloudDetails(t);
  return t;
}

// ====================== 播放 ======================

let hls = null;
let currentTrack = null;
let currentTrackList = null;
let currentTrackIndex = -1;
let searchResults = [];

function stopHLS() {
  if (hls) { hls.destroy(); hls = null; }
}

async function play(track, li, trackList, index) {
  updateNowPlaying({ title: '加载中...', artist: track.title, cover: null });
  try {
    await ensureDetails(track);
    if (!track.audioUrl) {
      updateNowPlaying({ title: '获取播放链接失败', artist: track.title, cover: null });
      return;
    }

    stopHLS();

    const isHLS = track.scIsHLS || track.audioUrl.endsWith('.m3u8') || track.audioUrl.includes('playback.media-streaming');

    if (isHLS && window.Hls && Hls.isSupported()) {
      hls = new Hls({ enableWorker: false });
      hls.loadSource(track.audioUrl);
      hls.attachMedia(audio);
      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        audio.play().catch(e => console.warn('autoplay:', e));
      });
    } else {
      audio.src = track.audioUrl;
      await audio.play();
    }

    currentTrack = track;
    currentTrackList = trackList;
    currentTrackIndex = index;
    searchResults = trackList;
    updateNowPlaying(track);
    renderLyrics(track);

    // 高亮当前播放行
    document.querySelectorAll('.track-list li').forEach(el => el.classList.remove('playing'));
    if (li) li.classList.add('playing');
  } catch (e) {
    updateNowPlaying({ title: '播放失败', artist: e.message, cover: null });
    console.error(e);
  }
}

// ====================== 搜索 & 初始化 ======================

async function doSearch() {
  const kw = document.getElementById('kw').value.trim();
  if (!kw) return;

  const sources = [];
  document.querySelectorAll('[data-s]:checked').forEach(cb => sources.push(cb.dataset.s));
  if (!sources.length) {
    document.getElementById('status').textContent = '请至少选一个音乐源';
    document.getElementById('status').className = 'status err';
    return;
  }

  document.getElementById('btn').disabled = true;
  document.getElementById('status').textContent = '搜索中...';
  document.getElementById('status').className = 'status';
  document.getElementById('trackList').innerHTML = '';
  switchView('search');

  let tracks = [];
  try {
    tracks = await searchAll(kw, sources, 10);
  } catch (e) {
    document.getElementById('status').textContent = '请求失败: ' + e.message;
    document.getElementById('status').className = 'status err';
    document.getElementById('btn').disabled = false;
    return;
  }

  if (!tracks.length) {
    document.getElementById('status').textContent = '没有结果，换关键词试试？';
    document.getElementById('btn').disabled = false;
    return;
  }

  document.getElementById('status').textContent = `找到 ${tracks.length} 首（点击标题播放 | ❤️ 喜欢 | 📋 加到歌单）`;
  document.getElementById('btn').disabled = false;
  renderTracks(tracks);
}

document.getElementById('btn').addEventListener('click', doSearch);
document.getElementById('kw').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

// ====================== 主题切换 ======================

const VIEW_MODE_KEY = 'listening_view_mode';
let trackViewMode = localStorage.getItem(VIEW_MODE_KEY) === 'list' ? 'list' : 'grid';
function trackListClass() {
  return 'track-list' + (trackViewMode === 'list' ? ' list-mode' : '');
}
function applyViewToggleButtons() {
  document.querySelectorAll('.view-toggle-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.mode === trackViewMode);
  });
}
function setTrackViewMode(mode) {
  trackViewMode = mode;
  localStorage.setItem(VIEW_MODE_KEY, mode);
  applyViewToggleButtons();
  const ol = document.getElementById('trackList');
  if (ol) ol.className = trackListClass();
}
document.querySelectorAll('.view-toggle-btn').forEach(btn => {
  btn.addEventListener('click', () => setTrackViewMode(btn.dataset.mode));
});
applyViewToggleButtons();
{
  const initialOl = document.getElementById('trackList');
  if (initialOl) initialOl.className = trackListClass();
}

const THEME_KEY = 'listening_theme';
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  const icon = document.getElementById('themeIcon');
  if (icon) icon.textContent = theme === 'light' ? 'light_mode' : 'dark_mode';
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
  const next = cur === 'light' ? 'dark' : 'light';
  localStorage.setItem(THEME_KEY, next);
  applyTheme(next);
}
document.getElementById('btnThemeToggle').addEventListener('click', toggleTheme);
applyTheme(localStorage.getItem(THEME_KEY) || 'dark');

// 初始化
renderSidebar(null);
</script>
